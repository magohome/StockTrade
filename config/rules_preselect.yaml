# rules_preselect.yaml
# 量化初选规则配置文件
# pipeline/select_stock.py 读取本文件中的参数

# ── 全局设置 ─────────────────────────────────────────────────────────
global:
  data_dir: "./data/raw"          # A股日线CSV目录
  output_dir: "./data/candidates" # 候选结果输出目录
  top_m: 1500                     # 活跃缩量池：取评分最高的 top_m 只
  n_turnover_days: 43             # 保留给候选输出的滚动成交额窗口（日）
  min_bars_buffer: 10             # 额外的最小 bar 缓冲

  # 活跃缩量池：
  # 1) 近20日均量 / 近200日均量 >= min_activity_20，代表中期有资金活跃
  # 2) dryup_min <= 近5日均量 / 近20日均量 <= dryup_max，代表短期缩量整理
  # 3) 近5日估算平均成交额 >= min_amount_ma5，用于排除绝对流动性太差的票
  # 排序优先级：activity_20 越高越靠前，其次 dryup_5 越接近 dryup_target 越靠前。
  volume_pool:
    min_amount_ma5: 0             # 估算成交额门槛；如需约5000万，可设 50000000
    min_activity_20: 1.2
    dryup_min: 0.35
    dryup_max: 0.8
    dryup_target: 0.55

# ── B1 策略参数（KDJ + 知行均线多头排列） ────────────────────────────
b1:
  enabled: true
  zx_m1: 14
  zx_m2: 28
  zx_m3: 57
  zx_m4: 114
  j_threshold: 15.0
  j_q_threshold: 0.10

# ── 砖型图（BrickChart）策略参数 ──────────────────────────────────────
brick:
  enabled: false

  # 砖型图计算参数
  n: 8
  m1: 3
  m2: 12
  m3: 12
  t: 8
  shift1: 92
  shift2: 114
  sma_w1: 1
  sma_w2: 1
  sma_w3: 1

  # 选股过滤阈值
  daily_return_threshold: 0.2    # 今日涨幅上限
  brick_growth_ratio: 0.5         # 今日红柱 >= N × 昨日绿柱绝对值
  min_prior_green_bars: 1         # 红柱前至少有几根连续绿柱

  # 知行线参数
  zxdq_ratio: 1.47                 # 收盘价 < zxdq × ratio；null = 不启用
  zxdq_span: 10
  require_zxdq_gt_zxdkx: true
  zxdkx_m1: 14
  zxdkx_m2: 28
  zxdkx_m3: 57
  zxdkx_m4: 114

  # 周线均线多头排列
  require_weekly_ma_bull: true
  wma_short: 5
  wma_mid: 10
  wma_long: 20
